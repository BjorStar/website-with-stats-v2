<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Startpage</title>
    <link rel="stylesheet" href="css/styles.css">

    <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="container mt-4">
  
  <div class="d-flex justify-content-end">
    <button class="btn btn-secondary mb-3" onclick="openSettings()">⚙️</button>
  </div>
    
  <h1 class="mb-4">Min startsida</h1>


  <section id="todo-widget">
  <h2>ToDo</h2>

  <div id="todo-settings">
    <label>
      API URL:
      <input type="text" id="todo-api-url-input" placeholder="https://your-rahti-url/todos">
    </label>
    <label>
      API Key:
      <input type="text" id="todo-api-key-input" placeholder="din api-nyckel">
    </label>
    <button id="todo-save-settings">Spara inställningar</button>
  </div>

  <form id="todo-form">
    <input type="text" id="todo-text-input" placeholder="Ny ToDo..." required>
    <select id="todo-category-select">
      <!-- Fylls antingen statiskt eller via API -->
      <option value="1">Work</option>
      <option value="2">Home</option>
    </select>
    <button type="submit">Lägg till</button>
  </form>

  <ul id="todo-list"></ul>
</section>


  <div class="row g-3">

    <div class="col-md-4">
      <div class="card p-3" id="ip">Min IP-adress</div>
    </div>
    
    <div class="col-md-4">
      <div class="card p-3" id="weather">Väder Helsinki</div>
    </div>

    <div class="col-md-4">
      <div class="card p-3" id="currency">1 € i olika valutor</div>
    </div>

    <div class="col-md-6">
      <div class="card p-3" id="joke">Dagens skämt</div>
    </div>

    <div class="col-md-6">
      <div class="card p-3">
        <h5>Ask Me Anything</h5>
        <input id="question" class="form-control mb-2">
        <button class="btn btn-primary" onclick="askAI()">Ask</button>
        <div id="answer"></div>
        <div id="chatbot-footer">Powered by qwen3.5:9b</div>
      </div>
    </div>

  </div>

  <div class="modal fade" id="settingsModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Settings</h5>
        <button type="button" class="btn-close" onclick="closeSettings()"></button>
      </div>

      <div class="modal-body">
        <label>OpenWeather API Key</label>
        <input id="weatherKeyInput" class="form-control mb-3">

        <label>OpenAI-AMA API Key</label>
        <input id="aiKeyInput" class="form-control">
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeSettings()">Close</button>
        <button class="btn btn-primary" onclick="saveSettings()">Save changes</button>
      </div>

    </div>
  </div>
</div>

<!-- Modal -->
  <div class="modal fade" id="settingsModal" tabindex="-1">
    ...
  </div>

<!-- JS files -->
<script src="js/weather.js"></script>
<script src="js/currency.js"></script>
<script src="js/joke.js"></script>
<script src="js/ip.js"></script>
<script src="js/chatbot.js"></script>
<script src="js/settings.js"></script>
<script src="js/todo.js" defer></script>

<link rel="stylesheet" href="css/todo.css">

<script>
    getWeather();
    getCurrency();
    getJoke();
    getIP();
</script>




</body>
</html>
